<VirtualHost *:80>
    DocumentRoot /var/www/html

    # API — let .htaccess handle routing
    <Directory /var/www/html/api>
        AllowOverride All
        Require all granted

        # Override .htaccess block on install.php for Docker first-run
        <Files "install.php">
            Require all granted
        </Files>
    </Directory>

    # Uploads — serve static files
    Alias /uploads /var/www/html/uploads
    <Directory /var/www/html/uploads>
        Require all granted
        Options -Indexes
    </Directory>

    # Frontend — serve built SPA
    <Directory /var/www/html/frontend/dist>
        Require all granted
        Options -Indexes
    </Directory>

    # Routing rules
    RewriteEngine On

    # API requests → pass through to api/ directory (let .htaccess handle it)
    RewriteRule ^/api(/.*)?$ /api$1 [L,PT]

    # Upload requests → serve as-is
    RewriteRule ^/uploads(/.*)?$ - [L]

    # Static frontend assets — serve directly if file exists
    RewriteCond /var/www/html/frontend/dist%{REQUEST_URI} -f
    RewriteRule ^(.*)$ /frontend/dist$1 [L]

    # Everything else → frontend SPA
    RewriteRule ^(.*)$ /frontend/dist/index.html [L]
</VirtualHost>
