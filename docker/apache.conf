<VirtualHost *:80>
    DocumentRoot /var/www/html

    # API — rewrite all /api/* requests to api/index.php
    <Directory /var/www/html/api>
        AllowOverride All
        Require all granted
    </Directory>

    # Uploads — serve static files
    Alias /uploads /var/www/html/uploads
    <Directory /var/www/html/uploads>
        Require all granted
        Options -Indexes
    </Directory>

    # Frontend — serve built SPA
    <Directory /var/www/html/frontend/dist>
        Require all granted
        Options -Indexes
    </Directory>

    # Routing rules
    RewriteEngine On

    # API requests → api/index.php
    RewriteRule ^/api(/.*)?$ /api/index.php [L,QSA]

    # Upload requests → serve as-is
    RewriteRule ^/uploads(/.*)?$ - [L]

    # Everything else → frontend SPA (if not a real file)
    RewriteCond /var/www/html/frontend/dist%{REQUEST_URI} !-f
    RewriteRule ^(.*)$ /frontend/dist/index.html [L]

    # If it IS a real file in frontend/dist, serve it
    RewriteCond /var/www/html/frontend/dist%{REQUEST_URI} -f
    RewriteRule ^(.*)$ /frontend/dist$1 [L]
</VirtualHost>
